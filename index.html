<!DOCTYPE html>
<html lang="cs">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKK Komunikátor</title>
  <style>
    :root {
        --bg-color: #f8f9fa;
        --card-bg: rgba(255, 255, 255, 0.9);
        --shadow: 0 10px 30px rgba(0,0,0,0.1);
        --radius: 20px;
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background: #e0e5ec; /* Soft neumorphic background */
        background-attachment: fixed;
        margin: 0; 
        padding: 20px; 
        color: #2d3436;
    }

    h1 {
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #4834d4;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
    }

    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
        gap: 25px; 
        max-width: 900px; 
        margin: 0 auto; 
        padding: 10px;
    }

    /* Styl pro všechna tlačítka (kategorie i slova) */
    
    button { 
        position: relative;
        padding: 25px 15px; 
        font-size: 20px; 
        font-weight: 700; 
        border: none; 
        border-radius: var(--radius); 
        cursor: pointer; 
        color: white; 
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        box-shadow: 8px 8px 16px #c1c9d2, -8px -8px 16px #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    button:hover {
        transform: translateY(-5px);
        box-shadow: 10px 10px 20px #b1b9c2, -10px -10px 20px #ffffff;
    }

    button:active { 
        transform: scale(0.92); 
        box-shadow: inset 5px 5px 10px rgba(0,0,0,0.2);
    }

    /* Speciální úprava pro obrázky v tlačítkách */
    img { 
        width: 100%; 
        height: 100%px; 
        margin-bottom: 15px; 
        object-fit: contain;
        filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        transition: transform 0.3s;
    }

    /* Tlačítko ZPĚT - Moderní styl */
    .gray { 
        background: var(--primary-gradient) !important;
        margin: 40px auto; 
        padding: 20px 50px; 
        width: auto; 
        min-width: 200px;
        font-size: 24px;
        border-radius: 50px;
        display: block;
        box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
    }

    .btn-main {
        min-height: 200px;
    }

    .hidden { display: none; }

    /* Animace pro přechod mezi sekcemi */
    #menu, #kategorie-detail {
        animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Responzivita pro mobily */
    @media (max-width: 500px) {
        .grid { grid-template-columns: 1fr 1fr; gap: 15px; }
        button { font-size: 16px; padding: 15px 5px; }
        img { width: 60px; height: 60px; }
    }
    /* Speciální styl pro doktora těla - záře */
button[onclick*="doktor_telo"] {
    box-shadow: 0 0 20px rgba(255, 95, 109, 0.4);
    border: 2px solid rgba(255, 255, 255, 0.5);
}

/* Speciální styl pro doktora duše - záře */
button[onclick*="doktor_dusa"] {
    box-shadow: 0 0 20px rgba(33, 147, 176, 0.4);
    border: 2px solid rgba(255, 255, 255, 0.5);
}
footer {
    margin-top: 50px;           /* Mezera od obsahu */
    padding: 20px;              /* Prostor uvnitř patičky */
    text-align: center;         /* Vycentrování textu */
    border-top: 1px solid #d1d9e6; /* Jemná linka pro oddělení */
    color: #7f8c8d;             /* Šedivá barva působí elegantněji než čistě černá */
    font-size: 14px;
    letter-spacing: 1px;        /* Mírné roztažení písmen */
}

footer p {
    margin: 0;
    font-weight: 600;
    opacity: 0.7;               /* Decentní průhlednost */
}

</style>

    <!-- Načtení knihovny Supabase -->
    <script src="https://jsdelivr.net"></script>

</head>
<body>

    <!-- 1. HLAVNÍ ROZCESTNÍK -->
    <div id="menu">
        <h1>Vyberte kategorii</h1>
        <div id="menu-grid" class="grid"></div>
    </div>

    <!-- 2. UNIVERZÁLNÍ SEKCE PRO TLAČÍTKA -->
    <div id="kategorie-detail" class="hidden">
        <h1 id="kategorie-nazev">Název sekce</h1>
        <div id="tlacitka-grid" class="grid"></div>
<button type="button" class="gray" onclick="ukazMenu()">⬅ ZPĚT</button>
    </div>

    <script>
       
const M_URL = 'https://acyplaaynqfprwszgtmo.supabase.co';
const M_KEY = 'sb_publishable_j41yg2foIBxZrQjhhRkoKA_p6BoqkfL'; 
const BUCKET_NAME = 'obrazy'; 

// Pomocná funkce pro sestavení URL obrázku - opravuje chybu s BUCKET vs BUCKET_NAME
function getImgUrl(imgId) {
    if (!imgId) return 'placeholder.png'; 
    if (imgId.startsWith('http')) return imgId;
    return `${M_URL}/storage/v1/object/public/${BUCKET_NAME}/${imgId}`;
}

window.onload = () => nactiMenu();

// Načtení hlavního rozcestníku
async function nactiMenu() {
    try {
        const url = `${M_URL}/rest/v1/aac_data?category=eq.main&lang=eq.cs`;
        const response = await fetch(url, {
            headers: { 'apikey': M_KEY, 'Authorization': 'Bearer ' + M_KEY }
        });
        const data = await response.json();
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        data.forEach(item => {
            const imgUrl = getImgUrl(item.img_id); 
            grid.innerHTML += `
                <button class="btn-main" style="background-color:${item.color || '#3498db'}" 
                        onclick="ukazKategorii('${item.item_id}', '${item.label}')">
                    <img src="${imgUrl}">
                    ${item.label}
                </button>`;
        });
    } catch (e) { console.error("Chyba při načítání menu:", e); }
}

async function ukazKategorii(id, nazev) {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('kategorie-detail').classList.remove('hidden');
    document.getElementById('kategorie-nazev').innerText = nazev;
    
    try {
        const url = `${M_URL}/rest/v1/aac_data?category=eq.${id}&lang=eq.cs`;
        const response = await fetch(url, {
            headers: { 'apikey': M_KEY, 'Authorization': 'Bearer ' + M_KEY }
        });
        const data = await response.json();
        const grid = document.getElementById('tlacitka-grid');
        grid.innerHTML = '';
        
        data.forEach(p => {
            const imgUrl = getImgUrl(p.img_id);
            
            // ROZHODNUTÍ: Má to mluvit, nebo otevírat?
            // Pokud je item_id v databázi prázdné, mluvíme.
            let onclickAction;
            if (!p.item_id || p.item_id === "" || p.item_id === "null") {
                onclickAction = `mluv('${p.label}')`;
            } else {
                onclickAction = `ukazKategorii('${p.item_id}', '${p.label}')`;
            }

            grid.innerHTML += `
                <button style="background-color:${p.color || '#e74c3c'}" onclick="${onclickAction}">
                    <img src="${imgUrl}">
                    ${p.label}
                </button>`;
        });
    } catch (e) { console.error("Chyba:", e); }
}


function mluv(t) {
    if (!t || !window.speechSynthesis) return;
    window.speechSynthesis.cancel(); 
    const m = new SpeechSynthesisUtterance(t);
    m.lang = 'cs-CZ';
    m.rate = 0.9; 
    window.speechSynthesis.speak(m);
}

function ukazMenu() { 
    document.getElementById('kategorie-detail').classList.add('hidden'); 
    document.getElementById('menu').classList.remove('hidden'); 
}
</script>

</body>
<footer>
        <p>D.F & J.U © 2026</p>
    </footer>
</html>
