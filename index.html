<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAK Komunikátor</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --radius: 20px;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #e0e5ec;
            margin: 0; 
            padding: 20px; 
            color: #2d3436;
        }

        h1 {
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            color: #4834d4;
            margin-bottom: 30px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 25px; 
            max-width: 900px; 
            margin: 0 auto; 
        }

        button { 
            padding: 25px 15px; 
            font-size: 20px; 
            font-weight: 700; 
            border: none; 
            border-radius: var(--radius); 
            cursor: pointer; 
            color: white; 
            transition: all 0.3s; 
            box-shadow: 8px 8px 16px #c1c9d2, -8px -8px 16px #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }

        button:active { transform: scale(0.95); }

        img { 
            width: 80px; 
            height: 80px; 
            margin-bottom: 10px; 
            object-fit: contain;
        }

        .btn-back { 
            background: var(--primary-gradient);
            margin: 30px auto; 
            padding: 15px 40px; 
            border-radius: 50px;
            display: block;
            min-height: auto;
        }

        .hidden { display: none; }

        footer {
            margin-top: 50px;
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>

    <!-- OPRAVENO: Správné načtení Supabase knihovny z CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="menu">
        <h1>Vyberte kategorii</h1>
        <div id="menu-grid" class="grid"></div>
    </div>

    <div id="kategorie-detail" class="hidden">
        <h1 id="kategorie-nazev">Název sekce</h1>
        <div id="tlacitka-grid" class="grid"></div>
        <button class="btn-back" onclick="ukazMenu()">⬅ ZPĚT</button>
    </div>

    <script>
        const M_URL = 'https://acyplaaynqfprwszgtmo.supabase.co';
        const M_KEY = 'sb_publishable_j41yg2foIBxZrQjhhRkoKA_p6BoqkfL'; 
        const BUCKET_NAME = 'obrazy'; 

        // INICIALIZACE: Vytvoření Supabase klienta pro přístup k datům
        const supabaseClient = supabase.createClient(M_URL, M_KEY);

        function getImgUrl(imgId) {
            if (!imgId) return 'placeholder.png'; 
            if (imgId.startsWith('http')) return imgId;
            return `${M_URL}/storage/v1/object/public/${BUCKET_NAME}/${imgId}`;
        }

        window.onload = () => nactiMenu();

        async function nactiMenu() {
            try {
                // Používáme inicializovaného klienta místo přímého fetch, je to bezpečnější
                const { data, error } = await supabaseClient
                    .from('aac_data')
                    .select('*')
                    .eq('category', 'main')
                    .eq('lang', 'cs');

                if (error) throw error;

                const grid = document.getElementById('menu-grid');
                grid.innerHTML = '';
                data.forEach(item => {
                    grid.innerHTML += `
                        <button style="background-color:${item.color || '#3498db'}" 
                                onclick="ukazKategorii('${item.item_id}', '${item.label}')">
                            <img src="${getImgUrl(item.img_id)}">
                            ${item.label}
                        </button>`;
                });
            } catch (e) { console.error("Chyba při načítání menu:", e); }
        }

        async function ukazKategorii(id, nazev) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('kategorie-detail').classList.remove('hidden');
            document.getElementById('kategorie-nazev').innerText = nazev;
            
            try {
                const { data, error } = await supabaseClient
                    .from('aac_data')
                    .select('*')
                    .eq('category', id)
                    .eq('lang', 'cs');

                if (error) throw error;

                const grid = document.getElementById('tlacitka-grid');
                grid.innerHTML = '';
                
                data.forEach(p => {
                    let onclickAction = (!p.item_id || p.item_id === "null") 
                        ? `mluv('${p.label}')` 
                        : `ukazKategorii('${p.item_id}', '${p.label}')`;

                    grid.innerHTML += `
                        <button style="background-color:${p.color || '#e74c3c'}" onclick="${onclickAction}">
                            <img src="${getImgUrl(p.img_id)}">
                            ${p.label}
                        </button>`;
                });
            } catch (e) { console.error("Chyba detailu:", e); }
        }

        function mluv(t) {
            if (!t || !window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'cs-CZ';
            window.speechSynthesis.speak(m);
        }

        function ukazMenu() { 
            document.getElementById('kategorie-detail').classList.add('hidden'); 
            document.getElementById('menu').classList.remove('hidden'); 
        }
    </script>

    <footer>
        <p>D.F & J.U © 2026</p>
    </footer>
</body>
</html>
