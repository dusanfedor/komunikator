<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAK Komunikátor</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --radius: 20px;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #e0e5ec;
            margin: 0; 
            padding: 20px; 
            color: #2d3436;
        }

        h1 {
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            color: #4834d4;
            margin-bottom: 30px;
        }

       
#menu-grid, #tlacitka-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); /* Automaticky se přizpůsobí šířce */
    gap: 15px;
    padding: 15px;
}

button {
    background-color: white;
    border: 4px solid #e0e0e0;
    border-radius: 15px;
    padding: 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    /* PŘIDÁNO: Toto omezí velikost tlačítka */
    max-width: 250px; 
    width: 100%;
    margin: 0 auto; /* Vycentrování v mřížce */
}


button img {
    width: 100%;      /* Roztažení do šířky */
    height: 75%;     /* Zabere 80 % výšky tlačítka */
    object-fit: contain; 
    margin: 5px auto; /* Malý odstup od okrajů */
}


button span {
    width: 100%;
    background-color: rgba(255, 255, 255, 0.8); /* Poloprůhledné pozadí pod textem */
     font-size: 1rem;
    padding: 2px 0;
    text-align: center;
}


       button:active {
    transform: scale(0.95); /* Efekt stisknutí */
    border-color: #3498db; /* Při kliknutí modře blikne */
}



        /* Samostatné nastavení pro tlačítko ZPĚT */
button.btn-back {
    aspect-ratio: auto;    /* Zruší čtverec */
    max-width: 300px;      /* Může být širší než ostatní */
    height: 60px;          /* Pevná výška */
    flex-direction: row;   /* Text bude vedle ikony, ne pod ní */
    background: var(--primary-gradient); /* Tvoje fialové pozadí */
    color: white;          /* Bílý text */
    font-size: 1.4rem;     /* Větší písmo */
    border: none;          /* Bez šedého rámečku */
    margin: 20px auto;     /* Vycentrování */
    display: flex;         /* Aby fungovalo centrování textu */
    justify-content: center;
    align-items: center;
    text-align:center;
}

/* Efekt při stisknutí specificky pro Zpět */
button.btn-back:active {
    transform: scale(0.95);
    filter: brightness(0.9);
}


        .hidden { display: none; }

        footer {
            margin-top: 50px;
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>

    <!-- OPRAVENO: Správné načtení Supabase knihovny z CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="menu">
        <h1>Vyberte kategorii</h1>
        <div id="menu-grid" class="grid"></div>
    </div>

    <div id="kategorie-detail" class="hidden">
        <h1 id="kategorie-nazev">Název sekce</h1>
        <div id="tlacitka-grid" class="grid"></div>
        <button class="btn-back" onclick="ukazMenu()">⬅ ZPĚT</button>
    </div>

    <script>
        const M_URL = 'https://acyplaaynqfprwszgtmo.supabase.co';
        const M_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjeXBsYWF5bnFmcHJ3c3pndG1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjYwMTIsImV4cCI6MjA5MTYwMjAxMn0.Reave_nIn8KXoD3zNTdVFvd2dlF262j8lxG-u4INAjY'; 
        const BUCKET_NAME = 'obrazy'; 

        // INICIALIZACE: Vytvoření Supabase klienta pro přístup k datům
        const supabaseClient = supabase.createClient(M_URL, M_KEY);

        function getImgUrl(imgId) {
            if (!imgId) return 'placeholder.png'; 
            if (imgId.startsWith('http')) return imgId;
            return `${M_URL}/storage/v1/object/public/${BUCKET_NAME}/${imgId}`;
        }

        window.onload = () => nactiMenu();

        async function nactiMenu() {
            try {
                // Používáme inicializovaného klienta místo přímého fetch, je to bezpečnější
                const { data, error } = await supabaseClient
                    .from('aac_data')
                    .select('*')
                    .eq('category', 'main')
                    .eq('lang', 'cs');

                if (error) throw error;

                const grid = document.getElementById('menu-grid');
                grid.innerHTML = '';
                data.forEach(item => {
                    grid.innerHTML += `
                        <button style="background-color:${item.color || '#3498db'}" 
                                onclick="ukazKategorii('${item.item_id}', '${item.label}')">
                            <img src="${getImgUrl(item.img_id)}">
                            ${item.label}
                        </button>`;
                });
            } catch (e) { console.error("Chyba při načítání menu:", e); }
        }
async function ukazKategorii(id, nazev) {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('kategorie-detail').classList.remove('hidden');
    document.getElementById('kategorie-nazev').innerText = nazev;
    
    try {
        const { data, error } = await supabaseClient
            .from('aac_data')
            .select('*')
            .eq('category', id)
            .eq('lang', 'cs');

        if (error) throw error;

        const grid = document.getElementById('tlacitka-grid');
        let html = ''; // Skládáme HTML bokem
        
        // Ve funkci ukazKategorii najdi smyčku data.forEach a uprav ji takto:
data.forEach(p => {
    let onclickAction = (!p.item_id || p.item_id === "null") 
        ? `mluv('${p.label}')` 
        : `ukazKategorii('${p.item_id}', '${p.label}')`;

    html += `
        <button style="border-color:${p.color || '#e74c3c'}" onclick="${onclickAction}">
            <img src="${getImgUrl(p.img_id)}">
            <span>${p.label}</span> 
        </button>`; // PŘIDÁNO: <span> kolem labelu
});

        

        grid.innerHTML = html; // Vložíme vše najednou
        window.scrollTo(0, 0); // Vždy odrolujeme nahoru při změně kategorie
        
    } catch (e) { 
        console.error("Chyba detailu:", e); 
    }
}


        function mluv(t) {
            if (!t || !window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'cs-CZ';
            window.speechSynthesis.speak(m);
        }

        function ukazMenu() { 
            document.getElementById('kategorie-detail').classList.add('hidden'); 
            document.getElementById('menu').classList.remove('hidden'); 
        }
    </script>

    <footer>
        <p>D.F & J.U © 2026</p>
    </footer>
</body>
</html>
